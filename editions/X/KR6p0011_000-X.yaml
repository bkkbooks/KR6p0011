body:
  text: 序淨慧居士刻觀經成有議之者謂禪非意想觀經純以想得往生居士既已身在宗門便當力持祖道今毋乃使人滯於蹊逕歟余謂茲屬淺視淨土之猥談並不知真禪之旨歸也夫參徹至明心見性斷必繫念一處不令走漏到利欲界內與五濁相磅久則心行處滅情想俱空法不存佛不立方成大解脫奚獨如來佛是甚乾屎橛即祖師禪喚作盌躂丘邇來陰識依通而悟者比比肯向靜寂中淘去邪思練成正覺雖不待十六觀鏡像現前九品蓮托胎見佛諒曾打併一番日用自然清淨寂光自得現前強似徒向冊本上學言記語造謗大般若之業居士覩今禪敝痛傷祖道凌夷盡皆向外馳求攘成傾奪惡習特拈出此經以鋮砭之使各於斯返照殆乃挽回風化之急助也何可議哉順治乙未秋日南湖老人褎翁行盛譔敘釋迦如來為一大事因緣出現於世大事者何生死大事也故始於說法終於拈華不過欲諸眾生各證成等正覺而已然歸元無二路方便有多門求其速了生死最捷徑者莫過於參禪了道而捷中之捷徑中之徑為異方便者尤莫尚於念佛往生乃世有聰明才智之士往往鄙之為愚夫愚婦之所為者夫口誦彌陀而心存塵垢志希安養而念繫娑婆誠可鄙矣至於真能念佛之人則淵寂通微冥心入妙能所兩忘事理一致如此而亦鄙之真天如禪師所謂非鄙愚夫愚婦乃鄙文殊普賢及馬鳴龍樹耳此佛說觀無量壽佛經不可以不誦也經中雖具有十六觀法尤以觀佛為一經宗要善觀者觀一切相為非相則能見彌陀之全體觀一切法如幻法則能入淨土之真境觀我身之無我則能具如來之正見是以從一如來而見無量如來入一境土而周無量淨土悟一法身而融無量法身無念而念無修而修無證而證豈非善了大事因緣者哉天台無盡法師教中義虎精通三觀搆圖精工攝頌爾雅惜年久湮蕪傳布甚少故特重梓流通復為麤釋一二典故以便初機俾見聞者因相以寓目因文而動懷歡喜讚歎發無上心同結淨土勝緣即有疑者謗者亦植善因不淺譬之城東老母誓不見佛以手障面終莫能逃況乎一歷識田永為道種耶是知此事不問親疎無分利鈍各有自性彌陀自現惟心淨土所以十惡五逆尚且十念往生散心持名亦可同登樂國獨彼疑謗之人籠鳥鼎魚翻稱快樂隙駒泡影妄計久長但恐一旦色力痿羸神識迷亂文章無靈錢神莫挽去路茫茫無本可據是使聰明才智之士反見笑於愚夫愚婦也敢請直下承當共入彌陀願海歲次乙未秋日武林菩薩戒弟子張文嘉仲嘉甫薰沐拜述
