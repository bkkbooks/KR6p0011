body:
  text: 宋元嘉中疆良耶舍譯如是我聞至文殊師利法王子而為上首圖經攝頌天台無盡法師傳燈述靈山嘉會如來趺坐耆闍崛三乘八部衆圍繞寂而常照鑒機宜猶若洪鐘以待扣久修久證真三昧心境如如清淨方一得往生不退轉應為圓機稱性説爾時王舍大城至一不得往闍王幽父闍王名為未生怨生來已有怨害相隨順調達惡友教汝弒頻婆作新王我弒牟尼作新佛共化世間亦快哉依教幽王重室內制諸羣臣不得往按梵語阿闍世此云未生怨母懷之日有冤惡相占者預記因以為名調達佛堂弟一名提婆達多與佛世世為仇以種種變幻動王子心立大精舍得大供養為王子云我殺牟尼以作新佛汝殺頻婆以作新王共化世間不亦快哉乃教王子放五百醉象踏殺如來佛入慈定舒手示之即於五指出五師子象見怖畏投地敬禮佛為衆云我於爾時手五指頭實無師子乃是慈善根力故令彼伏後復以惡毒著指抓中欲因禮拜以中傷佛往而未到地自然裂火車來迎生入地獄國太夫人至顏色和悅夫人密往國太夫人韋提希恭敬大王時密往身塗蜜纓盛漿日日用以奉大王食已漱口向佛禮尊者授戒為説法三七日中顏和悅怡然清淨得不死時阿闍世至不令復出加惡弒母闍王來問守門人父王今猶存在耶閽人具白如上事闍世瞋欲弒其母月光耆婆二大臣按劒苦諫怒方息敕語內官幽禁之局蹐深宮不令出時韋提希至云何當見阿彌陀佛極樂世界緣起弒逆韋提哀請此經發起因弒逆令人深厭娑婆苦親所生子尚復然他人能不按劒起極樂蓮華為父母無冤無親法平等大哉善權方便力普使羣生獲安養韋提遙向耆闍請如來山沒宮中現我昔何罪生斯子惟願往生無憂處即時放光現諸土極樂世界當其根三種福業先其緣十六觀門次其説佛告韋提希至名曰初觀落曰懸鼓創始先當觀落日狀如懸鼓繫其心制心一處辦大事況復西向示生方久久寂靜心不移靜極明生觀易成開目閉目常明了是為淨土之初門次作水想至名第二觀大水結冰極樂國地琉璃寶始欲觀之不易成大水結冰粗似之琉璃境界已現前下有寶幢以承擎八方八楞皆具足一一方面百寶成種種莊嚴難具説按八風者四維八方有八種風致自然之樂演妙法之音世有八苦謂生苦老苦病苦死苦愛別離苦怨憎會苦求不得苦五陰盛苦佛謂憍陳如等五比丘曰汝知色受想行色為是常為無常也為是苦為非苦也為是空為非空也為有我為非我也五比丘衆聞之漏盡意解成阿羅漢此想成時至名為邪觀琉璃寶地水想成時地已成一一觀之令明了閉目開目無散失惟除食時恆憶事是為粗見極樂地若得三昧難思議除八十億劫重罪作是觀者名正觀佛告阿難及韋提希至名第四觀七重行樹行樹八千由旬高七寶華葉作異色妙真珠網彌覆上七重行樹并諸網妙華宮殿居天童衆寶光嚴百千日諸華涌生諸妙果厥狀猶如帝釋瓶按大本云又其國土七寶諸樹周滿世界金樹銀樹琉璃樹玻璃樹珊瑚樹碼瑙樹硨磲之樹梵語釋迦毗楞伽此云能勝梵語摩尼此翻離垢言此寶光淨不為垢染又翻增長謂有此寶處增其威德又或翻為隨意如意閻浮檀金此云勝金閻浮者梵語云染部捺陀乃須彌西南西域河有此樹形高大其果甘美果汁入水沙石成金一粒置常金中皆失色佛身似之如帝釋瓶者帝釋梵語釋迦因陀羅此云能主謂其能為天主言瓶者昔有貧人常供養天滿十二歲求索富貴天慜此人自與一器名曰德瓶而語之言所須之物從此瓶出其人應意所欲無所不得今以妙華涌出諸果如彼天瓶出種種物故以喻之次當想水至名第五觀八功德水極樂世界八池水一一池水七寶成其寶柔軟珠王生涌出分為十四支黃金為渠金剛沙七寶蓮華六十億水注華樹尋上下演法化鳥讚三寶按八功德水一澄淨二清冷三甘美四輕軟五潤澤六安和七除飢渴八長養諸根具八種功德利益衆生也衆寶國土至名為邪觀總觀依報琉璃寶地八交道一一界以黃金繩界上五百億寶樓諸天於中作妓樂又有樂器懸虗空不鼓自鳴念三寶此想成已名粗見寶樹寶地及寶池佛告阿難至及二菩薩佛住空中如來將欲説佛觀西方三聖忽現前彌陀身如閻浮金相好光明無比論觀音侍左勢至右皆令韋提大衆見我今因佛得覩之未來衆生云何見佛告韋提希至名為邪觀蓮華寶座頌二蓮華八萬四千葉脈光具數正與等葉大一萬二千里五百億珠為映飾一一尼珠放千光其光猶如七寶蓋毗楞伽寶以為臺二寶珍網為莊校臺上自然有寶幢四柱猶如須彌山幢上寶幔如天宮五百億珠為映飾珠放八萬四千光一一光作異種色金剛珍珠雜華雲十二隨意作佛事按西域有甄叔迦樹具七寶色形大須彌此寶色似此等因以名焉須彌山者上云妙高如夜摩天者此云善時以彼見光明無晝夜之別故云善時阿彌陀佛以昔因中作菩薩比丘名為法藏於世界法王佛所發四十八願取此淨土攝諸善念今願力成故令所依華座若此佛告阿難至三藐三佛陀次當想佛華座既成當想佛衆生何以可得見諸佛如來法界身常入行人之世界是故汝等心想佛是心即相好光明是心作佛心是佛三號悉從心想生想彼佛者至得念佛三昧先作像觀未觀真佛先想像佛身猶如閻浮金坐彼華上心眼開極樂嚴飾極明了觀音坐左勢至右三像皆放大光明一一樹下三蓮華三聖恆俱宣妙法按正遍知如來十號之一無量甚深故喻如海梵語多陀阿伽度此云如來梵語阿羅訶此云應供梵語三藐三佛陀即此云正遍知皆諸佛之總號心感諸佛心即諸佛心尚能作諸佛豈不感於彌陀心尚即是諸佛豈不即是彌陀應知彌陀與一切佛不多不少諸佛乃即一之多彌陀乃即多之一也十二部經教總稱修多羅同名為經佛告阿難至名為邪觀佛真法身頌二佛身高六十萬億那由他恆沙由旬色如萬億夜摩天閻浮檀樹紫磨金白毫宛轉五須彌紺目澄清四大海身諸毛孔演光明猶如須彌山王勝圓光百億大千界化佛無量數最多身具八萬四千相相具八萬四千好好具八萬四千光其光遍攝念佛人見此即見於諸佛念佛三昧名已得按佛於八萬四千塵勞皆見實相理智冥合故能示現相好光明故節節云八萬四千無緣慈者無心攀緣自然現益也皆是如來慈善根力自然成就慈雲懺主云欲修觀者當於一處繩牀西向加趺端坐項脊相對不昂不傴調和氣息定住其心直想阿彌陀佛丈六金軀坐於華上專繫眉間白毫一相其毫長一丈五尺周圍五寸外有八稜其毫中空右旋宛轉在眉中間瑩靜明徹顯映金顏停心注想堅固勿移然復應觀想念所見若成未成皆想念因緣無實性相所有皆空如鏡像月影如夢如幻雖空而亦可見此皆心性所現不一不異非縱非橫不可思議心想寂靜則能成就念佛三昧久而乃起蓋因相有八萬都想難成故令但觀眉間毫相如五須彌此觀若成八萬皆現而此丈五觀法更便初機佛告阿難至名為邪觀觀音法身頌二觀音身量長八十萬億那由他由旬身體紫磨黃金色頂有肉髻項圓光每面各百千由旬五百化身如釋迦每佛五百化侍者五道衆生於中現毗楞伽寶為天冠天冠中有立化佛眉毫相備七寶色流出八萬四千光光中化佛化侍者譬如紅蓮無量光手足莊嚴諸相好一一如經之所説按寶積經中應持菩薩用神力上觀三十二恆河沙世界不能見佛頂故曰無見頂相不及世尊次觀大勢至菩薩至大勢至勢至法身頌二勢至身量等觀音舉身光照十方國但見菩薩毛孔光即見諸佛淨妙光以智慧光照一切是故號為無邊光令離三途得上力又復號為大勢至天冠五百寶蓮華佛國廣長於中現肉髻猶如鉢頭華寶瓶內盛諸光明行時世界咸震動寶華莊嚴如極樂坐時國土悉動搖西方三聖皆雲集見此事時至常來至此行人之所普觀當生見此事時作生想自心生於極樂國趺坐蓮華合門想五百色光來照身見佛菩薩滿空中水鳥樹林宣妙法出定之時與定合如是見時名普觀佛告阿難至名第十三觀雜觀三聖若欲至心生西方先當觀於丈六像觀音侍左勢至右十方變現得自在或現丈六或八尺所現之形真金色但觀首相知二尊是為西方雜想觀按觀首相者頂上有化佛者觀音也頂上有寶瓶者勢至也餘相皆同佛告阿難至是名上品上生者九品總圖三輩往生分九品同生淨土寶池中一者進道有遲疾二者所乘有殊異三者華開有早晚四者見佛有明昧但使獲預下下流亦得永階於不退上品上生頌二若有衆生欲往生應當發其三種心至誠深心回向心具此三心即往生復有三種之衆生慈心不殺具諸戒讀誦大乘方等經修行六念願往生此人精進勇猛故西方三聖現其前化佛比丘諸天衆放大光明照其身授手接以金剛臺一彈指頃生彼國見佛相好悟無生即得無量總持門上品中生者至是名上品中生者上品中生頌二不必持誦方等經善解義趣心不動深信因果不謗法以此回向而求生臨終三聖來接引持紫金臺至其前一千化佛俱授手即見身坐寶蓮臺合掌叉手讚諸佛如一念頃生池中寶華經宿方乃開即見其身真金色足蹈蓮華佛放光普聞衆聲説妙法七日於道不退轉經一小劫得無生上品下生者至名第十四觀上品下生頌二亦信因果不謗法但發無上菩提心以此功德而回向發願求生極樂國行者臨欲命終時三聖手持金蓮華化五百佛來至此一時授手而接引讚言法子發道心是故我今來迎汝即見自身坐金蓮華合隨從世尊後一日一夜華方開三七日後見了了供佛更經三小劫得百法門歡喜地佛告阿難至是名中品上生者中品上生頌二受持五八并諸戒不造五逆無衆過以此善根普回向發願求生極樂國阿彌陀佛來接引與諸比丘共圍繞至其人前為説法讚歎出家離衆苦行者見已心歡喜自身趺坐蓮華臺長跪合掌禮彌陀未舉頭頃生華中蓮華尋開聞法音讚歎苦集滅道法應時即得阿羅漢三明六通八解脫按八戒齋者一名八關齋戒謂不殺不盜不淫不妄語不飲酒不坐高廣大牀不著華鬘瓔珞及香油塗身熏衣不自歌舞往聽不過中食關者禁閉八罪不令犯也齋以不過中食為體以八事助成齋體共相支持故又名八支齋法是故言八不言九也此通俗人受以一日一夜為期中品中生者至是名中品中生者中品中生頌二若人一日與一夜受持八關之齋戒或持沙彌之十戒或持比丘具足戒三千威儀八萬行一一護持無缺犯以此回向并發願戒香熏修以為因行者臨欲命終時見佛眷屬放光明手持七寶蓮華臺俱時來至行者前自聞空中讚歎言隨順佛教來迎汝七日華開證初果經半劫成阿羅漢按具足戒者即菩薩戒十重四十八輕也中品下生者至名第十五觀中品下生頌二若人孝養於父母行世仁慈衆善行命終得遇善知識為其演説淨土事極樂世界妙莊嚴彌陀四十八大願聞已歡喜即命終而得往生安養土譬如壯土伸臂頃即時已生彼世界生彼土已經七日得遇觀音大勢至菩薩為説種種法爾時即證須陀洹過此更經一小劫得成四果阿羅漢佛告阿難至是名下品上生者下品上生頌二此人雖不謗方等多造惡業無慚愧命終得遇善知識為説十二部經卷以聞如是經名故除却千劫重惡業復教叉手稱彌陀除五十劫生死罪彼佛即遣化三聖至行者前讚歎言以汝稱佛滅諸罪是故我今來迎汝見光即生華池中七七華開見聖尊放光説法發道心經十小劫登初地佛告阿難至是名下品中生者下品中生頌二五戒八戒具足戒如是愚人都毀犯盜僧祇物現前物不淨説法無慚愧惡業莊嚴應墮獄善友慈悲為讚佛十力威德及光明五分法身皆讚説是人聞已滅重罪地獄火化清涼風吹諸天華華坐佛三聖俱來接引之如一頃念生彼國經於六劫華方敷為説大乘甚深經應時即發大道心佛告阿難至名第十六觀下品下生頌二或有衆生作不善五逆十惡備衆惡如此愚人應墮獄經歷多劫受諸苦善友安慰説妙法教令念佛生西方是人苦迫不遑念復勸高聲稱佛名高聲稱佛盡一氣具足十念稱佛名念念滅除多劫罪即乘佛力生淨土十二大劫蓮華開二大菩薩為宣説諸法實相除罪法聞已即發菩提心説是語時至逮無生忍夫人悟道韋提聞佛説是法應時即見極樂國廣長之相極分明亦見彌陀二大士心生歡喜未曾有豁然大悟裂惑網登圓初位發心住發三德性證無生五百侍女至發無上道心侍女發心五百侍女大因緣夙有善根預茲會聞法而思思而修十六觀門悉成就皆發無上菩提心各各願生極樂國世尊授記當往生獲得現前真三昧無量諸天亦同發無上正等菩提心按夫人悟道侍女發心阿闍父王亦證阿那含果獨阿闍世未彰報應心竊疑之後閲涅槃梵行品云阿闍世殺父害母至涅槃會身瘡腫熱生重慚愧悔過自責耆婆勸往佛所佛為説法得無根信又大彌陀經亦載阿闍世王太子與五百長者子聞説阿彌陀佛功德皆大歡喜願如阿彌陀佛佛即授記皆當作佛由是觀之如來法門廣大不拒來者亦足以為十惡往生之一證云而或又謂調達闍世頻婆韋提皆是大權菩薩現逆現順利益衆生理容有之十惡之人臨終遇善知識十念往生者皆是宿善業強始得成就樂文類云世有十種臨命不得念佛一善友不遇無人勸念二病苦纏身不遑念佛三或偏風失語不能念佛四或狂亂失心注想難成五遭水火不暇志誠六遇豺狼無復善友七臨終惡友壞彼信心八飽食過度昏迷致死九軍陳鬭戰奄忽而亡十忽墜高巖傷壞性命如是十種斷不能念應須預為修持使淨業先成縱遇難緣必得彌陀接引而往也爾時阿難至皆大歡喜王宮流通頌二阿難問佛當何名此法之要云何持佛答名觀極樂國無量壽佛二大士亦名除障生佛前汝當受持無忘失若有行此三昧者現身得見三聖尊若善男子善女人但聞佛名菩薩名除無量劫生死罪何況憶念而受持世間若有念佛者即是人中芬陀華二大菩薩為勝友當坐道場生佛家按梵語分陀利此云白蓮華涅槃云水生華中分陀利最為第一爾時世尊至還耆闍崛山足步虗還如來神通具隱顯隨機所現各不同韋提哀請化將成是故山沒宮中現今者觀法已周圓足步虗空還耆崛普令見者知斯事各各仰遵於法化爾時阿難至禮佛而退崛山流通如來王宮説法已足步虗空還耆山慶喜廣為大衆説天龍聞法歡喜去遂令大法永流通正像末法受其施蓮宗一脈傳至今無量衆生生淨土繪圖攝頌二我今未能即忘筌按圖索馬為準的如此繪像差得真而我攝頌多遺漏普願信者讀誦者見聞歡喜讚美者皆作人中白蓮華當坐道場生佛家見佛見土及見圖三見同用此一見見佛即見真法身見土即見常寂光豈不見圖同此二圖圖見佛妙依正我願見此圖經者應當志心如是觀
